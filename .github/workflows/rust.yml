name: Rust

on:
  push:
    branches:
      - main
  pull_request:
  merge_group:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - run: rustup toolchain install stable --profile minimal

      - uses: Swatinem/rust-cache@v2
        with:
          cache-workspace-crates: true
      - name: Build
        run: cargo build
      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
      - name: Run tests
        run: |
          cargo test --verbose --workspace --exclude fontspector-web
          uv venv .venv
          . .venv/bin/activate
          uv pip install maturin pytest
          cd fontspector-py
          maturin build
          uv pip install ../target/wheels/fontspector*.whl
          uv run pytest tests --verbose

  formatting:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - run: rustup toolchain install stable --profile default
      - uses: Swatinem/rust-cache@v2
        with:
          cache-workspace-crates: true
      - name: Lint for formatting
        run: cargo fmt --all -- --check
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - run: rustup toolchain install stable --profile default
      - uses: Swatinem/rust-cache@v2
        with:
          cache-workspace-crates: true
      - name: Lint for warnings
        run: cargo clippy --all-targets --all-features -- -D warnings

  wasm-still-builds:
    name: Check that the web site still builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install protobuf-compiler
      - name: Install wasm-pack
        run: cargo install wasm-pack
      - name: Build
        run: cd fontspector-web; RUSTFLAGS='-C target-feature=+bulk-memory' wasm-pack build
      - name: Build web site
        run: |
          cd fontspector-web/www
          npm install
          npm run build

  deploy-binaries:
    name: Build and upload binaries
    permissions:
      contents: write
      id-token: write
    runs-on: ${{ matrix.os.os }}
    # Only build on main or tag
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    strategy:
      fail-fast: false
      matrix:
        os:
          - build: linux
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

          - build: macos
            os: macos-latest
            target: x86_64-apple-darwin

          - build: macos-m1
            os: macos-latest
            target: aarch64-apple-darwin

          - build: windows-gnu
            os: windows-latest
            target: x86_64-pc-windows-gnu
        # python: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive
      - run: rustup toolchain install stable --profile minimal
      - if: matrix.os.target == 'x86_64-apple-darwin'
        run: rustup target add x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          cache-workspace-crates: true
          add-job-id-key: false

      # - name: Set up python
      #   uses: actions/setup-python@v5
      #   with:
      #     python-version: ${{ matrix.python }}
      - name: Build
        run: cargo build --verbose --release --target ${{ matrix.os.target }}
      - name: Decide on our version name (tag or "dev")
        id: version
        shell: bash
        run: |
          if [ -n "$GITHUB_REF" ]; then
              if [[ "$GITHUB_REF" == refs/tags/fontspector-v* ]]; then
                  echo "VERSION=${GITHUB_REF/refs\/tags\/fontspector-/}" >> $GITHUB_ENV
              else
                  echo "VERSION=dev" >> $GITHUB_ENV
              fi
          else
              echo "VERSION=dev" >> $GITHUB_ENV
          fi
      - name: Build archive
        shell: bash
        run: |
          # dirname="fontspector-${{ env.VERSION }}-${{ matrix.os.target }}-py${{ matrix.python }}"
          dirname="fontspector-${{ env.VERSION }}-${{ matrix.os.target }}"
          mkdir "$dirname"
          if [ "${{ matrix.os.os }}" = "windows-latest" ]; then
              mv "target/${{ matrix.os.target }}/release/"*.exe "$dirname"
              7z a "$dirname.zip" "$dirname"
              echo "ASSET=$dirname.zip" >> $GITHUB_ENV
          else
              mv "target/${{ matrix.os.target }}/release/fontspector" "$dirname"
              tar -czf "$dirname.tar.gz" "$dirname"
              echo "ASSET=$dirname.tar.gz" >> $GITHUB_ENV
          fi
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ASSET }}
          path: ${{ env.ASSET }}
      - if: contains(github.ref, 'refs/tags/fontspector-v')
        name: Add artefact to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload fontspector-${{ env.VERSION }} ${{ env.ASSET }}
